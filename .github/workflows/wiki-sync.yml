name: Sync to Wiki

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  sync_wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Wiki Files
        run: |
          mkdir temp_wiki
          
          # Use main README as Wiki Home
          if [ -f README.md ]; then
            cp README.md temp_wiki/Home.md
          fi
          
          # Map Developer documentation
          if [ -f ADD_NEW_PROVIDER.md ]; then
            cp ADD_NEW_PROVIDER.md "temp_wiki/Dev - Add New Provider.md"
          fi
          
          # Collect all Provider READMEs and rename them for a flat structure
          if [ -d Providers ]; then
            for provider_dir in Providers/*/; do
              if [ -f "${provider_dir}README.md" ]; then
                # Extract provider name from directory path
                provider_name=$(basename "$provider_dir")
                cp "${provider_dir}README.md" "temp_wiki/Provider - ${provider_name}.md"
              fi
            done
          fi

      - name: Deploy to Wiki
        run: |
          # The Wiki is a separate Git repository at [repo].wiki.git
          WIKI_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          
          # Clone the wiki repository
          git clone "$WIKI_URL" wiki_temp_repo
          
          # Clean out the old files in the wiki repo (except .git)
          cd wiki_temp_repo
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          
          # Copy new files from our prepared folder
          cp -rv ../temp_wiki/* .
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and push if there are changes
          git add .
          if git diff-index --quiet HEAD; then
            echo "No changes to wiki. Skipping push."
          else
            git commit -m "Auto-update wiki from documentation (SHA: ${{ github.sha }})"
            git push origin master || git push origin main
          fi

